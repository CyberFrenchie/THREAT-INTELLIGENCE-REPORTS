remote_theme: mmistakes/minimal-mistakes
title: "Cairn Intelligence — Threat Intelligence Research"
description: "Published threat intelligence research from Cairn Intelligence — OSINT-led investigations, spyware analysis, infrastructure research, and IOC reporting for Scottish and UK businesses."
url: "https://reports.cairnintelligence.com"
baseurl: ""

plugins:
  - jekyll-include-cache
  - jekyll-archives
  - jekyll-feed
  - jekyll-seo-tag

og_image: "/assets/images/cairn-og.png"

feed:
  path: feed.xml

# -------------------------------------------------------
# Author Profile (shows in sidebar on every page)
# -------------------------------------------------------
author:
  name: "Sam Dalgleish"
  bio: "Founder, Cairn Intelligence. Cybersecurity researcher specialising in threat intelligence and OSINT investigation. Published CVE researcher (CVE-2025-9548). BSc Digital Security & Forensics, Glasgow Caledonian University."
  location: "Paisley, Scotland"
  links:
    - label: "Cairn Intelligence"
      icon: "fas fa-fw fa-globe"
      url: "https://cairnintelligence.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/CyberFrenchie"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/sam-dalgleish-334250306"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:sam@cairnintelligence.com"

# -------------------------------------------------------
# Defaults — apply author_profile sidebar to all pages
# -------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# -------------------------------------------------------
# Analytics
# -------------------------------------------------------
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-M63130G1ZM"
    anonymize_ip: false

# -------------------------------------------------------
# Site settings
# -------------------------------------------------------
locale: "en-GB"
timezone: Europe/London
github_username: CyberFrenchie
twitter:
  username: "cairnintel"
logo: "/assets/images/cairn-og.png"
search: true
search_full_content: true
