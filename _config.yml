remote_theme: mmistakes/minimal-mistakes
title: "Cairn Intelligence — Threat Intelligence Research"
description: "Published threat intelligence research from Cairn Intelligence — malware analysis, spyware attribution, RAT C2 investigation, and IOC reporting."
url: "https://reports.cairnintelligence.com"
baseurl: ""

plugins:
  - jekyll-include-cache
  - jekyll-archives
  - jekyll-feed

feed:
  path: feed.xml

# -------------------------------------------------------
# Author Profile (shows in sidebar on every page)
# -------------------------------------------------------
author:
  name: "Sam Dalgleish"
  bio: "Founder, Cairn Intelligence. Cybersecurity researcher specialising in threat intelligence, OSINT, and malware analysis. Published CVE researcher (CVE-2025-9548). BSc Digital Security & Forensics, Glasgow Caledonian University. TryHackMe Master — top 3% globally."
  location: "Paisley, Scotland"
  links:
    - label: "Cairn Intelligence"
      icon: "fas fa-fw fa-globe"
      url: "https://cairnintelligence.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/CyberFrenchie"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/sam-dalgleish-334250306"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:sam@cairnintelligence.com"

# -------------------------------------------------------
# Defaults — apply author_profile sidebar to all pages
# -------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# -------------------------------------------------------
# Analytics
# -------------------------------------------------------
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-M63130G1ZM"
    anonymize_ip: false

# -------------------------------------------------------
# Site settings
# -------------------------------------------------------
locale: "en-GB"
timezone: Europe/London
github_username: CyberFrenchie
